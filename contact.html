<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TobiasFitness/Kontakt</title>
    <link rel="stylesheet" href="contact.css" />
  </head>
  <body>
    <nav>
      <input type="checkbox" id="sidebar-active" />
      <label for="sidebar-active" class="open-sidebar-button">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          height="32px"
          viewBox="0 -960 960 960"
          width="32px"
          fill="#e3e3e3"
        >
          <path
            d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
          />
        </svg>
      </label>

      <label id="overlay" for="sidebar-active"></label>

      <div class="links-container">
        <a href="index.html" class="home-link">Forside</a>
        <a href="priser.html">Priser</a>
      </div>
    </nav>

    <section id="kontakt-form">
      <div class="overview">
        <label class="current">Information</label>
        <label>Ydelse</label>
        <label>Andet</label>
        <label>Kvitering</label>
      </div>

      <form action="https://formspree.io/f/xkozqowa" method="post">
        <div class="section info active">
          <div class="form-group">
            <label for="firstname">Fornavn*</label>

            <input
              type="text"
              name="Fornavn"
              id="firstname"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <div class="form-group">
            <label for="lastname">Efternavn*</label>

            <input
              type="text"
              name="Efternavn"
              id="lastname"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <div class="form-group">
            <label for="email">Email*</label>

            <input
              type="email"
              name="Email"
              id="email"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <div class="form-group">
            <label for="adress">Adresse*</label>

            <input
              type="text"
              name="Adresse"
              id="adress"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <div class="form-group">
            <label for="zip-code">Postnummer*</label>

            <input
              type="number"
              name="Postnummer"
              id="zip-code"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <div class="form-group">
            <label for="town">By*</label>

            <input
              type="text"
              name="By"
              id="town"
              required
              class="form-element"
              placeholder="Jane"
            />
          </div>

          <button type="button" class="back button" onclick="back()">
            Tilbage
          </button>
          <button type="button" class="next button" onclick="next()">
            Næste
          </button>
        </div>

        <div class="section job">
          <button type="button" class="back button" onclick="back()">
            Tilbage
          </button>
          <button type="button" class="next button" onclick="next()">
            Næste
          </button>
        </div>
      </form>
    </section>

    <script src="contact.js"></script>
  </body>
</html>
